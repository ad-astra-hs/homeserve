# Homeserve Configuration File
#
# Copy this file to `homeserve.toml` and customize as needed.
# All values shown here are the defaults - uncomment and modify to override.

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================

[server]
# The TCP port to listen on for incoming HTTP connections.
# Common values: 8000 (development), 80 (HTTP production), 8080 (alternative)
port = 8000

# The network interface to bind to.
# - "0.0.0.0" listens on all available network interfaces (production)
# - "127.0.0.1" listens only on localhost (development only)
host = "0.0.0.0"

# =============================================================================
# PATHS CONFIGURATION
# =============================================================================

[paths]
# Directory containing static assets (images, audio, video files).
# These files are served directly at /assets/<filename>
assets_directory = "./priv/static/assets"

# Directory containing optional per-panel CSS and JavaScript files.
# Files here are served at /assets/misc/<filename>
extra_directory = "./priv/static/extra"

# =============================================================================
# MNESIA CONFIGURATION (OPTIONAL)
# =============================================================================
#
# Homeserve uses Mnesia (Erlang/BEAM's built-in database) to store panel
# documents and volunteer information.
#
# IMPORTANT:
#   - Mnesia is built into the Erlang/BEAM runtime - no external database needed!
#   - Data is stored locally in the Mnesia directory
#   - By default, data is stored in the Erlang Mnesia directory

[mnesia]
# Optional: Custom data directory for Mnesia storage.
# If not set, uses Erlang's default Mnesia directory.
# data_dir = "./data/mnesia"

# =============================================================================
# ADMIN PANEL CONFIGURATION
# =============================================================================

[admin]
# Authentication token for accessing the admin panel at /admin
#
# SECURITY WARNING: Change this from the default in production!
# Generate a secure random token, for example:
#   - Linux/macOS: openssl rand -base64 32
#   - Or use any secure random string generator
#
# Access the admin panel with: /admin?token=<your-token>
#
# NOTE: For enhanced security, you can use a SHA-256 hashed token.
# The token can be either:
#   - Plaintext (for development): token = "my-secret-token"
#   - SHA-256 hash (for production): token = "sha256:<salt>:<hash>"
#
# When using a hashed token, users still enter the plaintext token,
# but the config only stores the hash.
token = "changeme"

# =============================================================================
# CONTACT CONFIGURATION
# =============================================================================

[contact]
# Email address displayed on the privacy policy page for privacy concerns
# and general contact. Update this to match your deployment.
email = "admin@example.com"

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================

[logging]
# Log level for the application
# Valid values: "debug", "info", "warning", "error"
# Default: "info"
level = "info"
